name: Build & Release PDF

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
      - name: Rename PDF
        run: mv main.pdf BrainTrain.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: BrainTrain
          path: BrainTrain.pdf

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: BrainTrain
      - uses: softprops/action-gh-release@v2
        with:
          files: BrainTrain.pdf
